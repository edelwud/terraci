# yaml-language-server: $schema=https://raw.githubusercontent.com/edelwud/terraci/main/terraci.schema.json
structure:
  pattern: "{service}/{environment}/{region}/{module}"

library_modules:
  paths:
    - "_modules"

execution:
  binary: terraform
  init_enabled: true
  plan_enabled: true

extensions:
  gitlab:
    image:
      name: hashicorp/terraform:1.6
    stages_prefix: "deploy"
    parallelism: 5
    auto_approve: false
    cache_enabled: true
