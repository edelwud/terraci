# yaml-language-server: $schema=https://raw.githubusercontent.com/edelwud/terraci/main/.terraci.schema.json
service_dir: .terraci
structure:
    pattern: '{service}/{environment}/{region}/{module}'
plugins:
    cost:
        enabled: true
    gitlab:
        auto_approve: true
        image:
            name: hashicorp/terraform:1.6
        init_enabled: true
        plan_enabled: true
        terraform_binary: tofu
    policy:
        enabled: true
        on_failure: block
        sources:
            - path: policies
    summary: {}
