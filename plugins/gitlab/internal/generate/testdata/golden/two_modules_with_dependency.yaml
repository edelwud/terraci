apply-platform-stage-eu-central-1-eks:
    stage: deploy-3
    script:
        - cd platform/stage/eu-central-1/eks
        - terraform init
        - terraform apply plan.tfplan
    variables:
        TF_ENVIRONMENT: stage
        TF_MODULE: eks
        TF_MODULE_PATH: platform/stage/eu-central-1/eks
        TF_REGION: eu-central-1
        TF_SERVICE: platform
    needs:
        - job: plan-platform-stage-eu-central-1-eks
          artifacts: true
        - job: apply-platform-stage-eu-central-1-vpc
          artifacts: false
    cache:
        key: platform-stage-eu-central-1-eks
        paths:
            - platform/stage/eu-central-1/eks/.terraform/
    resource_group: platform/stage/eu-central-1/eks
apply-platform-stage-eu-central-1-vpc:
    stage: deploy-1
    script:
        - cd platform/stage/eu-central-1/vpc
        - terraform init
        - terraform apply plan.tfplan
    variables:
        TF_ENVIRONMENT: stage
        TF_MODULE: vpc
        TF_MODULE_PATH: platform/stage/eu-central-1/vpc
        TF_REGION: eu-central-1
        TF_SERVICE: platform
    needs:
        - job: plan-platform-stage-eu-central-1-vpc
          artifacts: true
    cache:
        key: platform-stage-eu-central-1-vpc
        paths:
            - platform/stage/eu-central-1/vpc/.terraform/
    resource_group: platform/stage/eu-central-1/vpc
default:
    image: hashicorp/terraform:1.6
plan-platform-stage-eu-central-1-eks:
    stage: deploy-2
    script:
        - cd platform/stage/eu-central-1/eks
        - terraform init
        - terraform plan -out=plan.tfplan
    variables:
        TF_ENVIRONMENT: stage
        TF_MODULE: eks
        TF_MODULE_PATH: platform/stage/eu-central-1/eks
        TF_REGION: eu-central-1
        TF_SERVICE: platform
    needs:
        - job: apply-platform-stage-eu-central-1-vpc
          artifacts: false
    artifacts:
        paths:
            - platform/stage/eu-central-1/eks/plan.tfplan
        expire_in: 1 day
        name: terraci-plan-platform-stage-eu-central-1-eks
        when: always
    cache:
        key: platform-stage-eu-central-1-eks
        paths:
            - platform/stage/eu-central-1/eks/.terraform/
    resource_group: platform/stage/eu-central-1/eks
plan-platform-stage-eu-central-1-vpc:
    stage: deploy-0
    script:
        - cd platform/stage/eu-central-1/vpc
        - terraform init
        - terraform plan -out=plan.tfplan
    variables:
        TF_ENVIRONMENT: stage
        TF_MODULE: vpc
        TF_MODULE_PATH: platform/stage/eu-central-1/vpc
        TF_REGION: eu-central-1
        TF_SERVICE: platform
    artifacts:
        paths:
            - platform/stage/eu-central-1/vpc/plan.tfplan
        expire_in: 1 day
        name: terraci-plan-platform-stage-eu-central-1-vpc
        when: always
    cache:
        key: platform-stage-eu-central-1-vpc
        paths:
            - platform/stage/eu-central-1/vpc/.terraform/
    resource_group: platform/stage/eu-central-1/vpc
stages:
    - deploy-0
    - deploy-1
    - deploy-2
    - deploy-3
