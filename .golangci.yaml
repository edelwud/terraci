# yaml-language-server: $schema=https://json.schemastore.org/golangci-lint.json
version: "2"

run:
  modules-download-mode: readonly

linters:
  default: none
  enable:
    # --- bug prevention ---
    - bodyclose          # unclosed HTTP response bodies
    - copyloopvar        # loop variable copy bugs
    - durationcheck      # incorrect time.Duration arithmetic
    - errorlint          # error wrapping with %w
    - nilerr             # returning nil when err != nil
    - noctx              # HTTP requests without context
    - nilnesserr         # err != nil check but returns different nil error
    - fatcontext         # nested contexts in loops
    - forcetypeassert    # unchecked type assertions
    - rowserrcheck       # unchecked sql.Rows.Err
    - sqlclosecheck      # unclosed sql.Rows/sql.Stmt

    # --- security ---
    - bidichk            # dangerous unicode bidi characters
    - gosec              # security vulnerabilities

    # --- code quality ---
    - errcheck           # unchecked error returns
    - govet              # go vet checks
    - staticcheck        # comprehensive static analysis
    - unused             # unused code
    - ineffassign        # useless assignments
    - unconvert          # unnecessary type conversions
    - unparam            # unused function parameters
    - goconst            # repeated strings → constants
    - gocritic           # bugs, performance, style
    - revive             # golint successor
    - predeclared        # shadowing predeclared identifiers
    - whitespace         # leading/trailing whitespace in blocks
    - nakedret           # naked returns in long functions
    - exhaustive         # non-exhaustive enum switches
    - prealloc           # slice preallocation hints

    # --- modernization ---
    - intrange           # integer range loops (Go 1.22+)
    - exptostd           # x/exp → stdlib replacements
    - usestdlibvars      # use stdlib constants/variables
    - modernize          # modern Go idioms
    - perfsprint         # faster fmt.Sprintf alternatives

    # --- naming & style ---
    - errname            # Err prefix for sentinel errors
    - gochecknoinits     # discourage init() (excluded for plugins)
    - goprintffuncname   # printf-like functions named with f suffix
    - misspell           # English spelling in comments/strings
    - dupword            # duplicate words in comments
    - nolintlint         # well-formed nolint directives
    - recvcheck          # consistent receiver types

    # --- complexity ---
    - gocyclo            # cyclomatic complexity
    - nestif             # deeply nested ifs

    # --- testing ---
    - tparallel          # t.Parallel() misuse
    - thelper            # t.Helper() in test helpers
    - usetesting         # testing package best practices

  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true
    goconst:
      min-len: 3
      # 5 occurrences (raised from 3) keeps the lint actionable: AWS region
      # codes / common attribute keys ("type", "size", "key") naturally
      # repeat across hundreds of files without buying anything by being
      # extracted into named constants.
      min-occurrences: 5
    gocritic:
      disabled-checks:
        - whyNoLint
        - hugeParam
      enabled-tags:
        - diagnostic
        - experimental
        - opinionated
        - performance
        - style
    gocyclo:
      min-complexity: 20
    nestif:
      min-complexity: 7
    gosec:
      excludes:
        - G101   # false positive on hardcoded credentials
        - G304   # file inclusion via variable (CLI tool needs this)
    govet:
      disable:
        - fieldalignment
      enable-all: true
    misspell:
      locale: US
    mnd:
      ignored-numbers:
        - "0"
        - "1"
        - "2"
        - "4"
        - "5"
        - "10"
        - "100"
      ignored-functions:
        - strings.SplitN
        - os.WriteFile
        - os.MkdirAll
    nakedret:
      max-func-lines: 30
    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
        - name: if-return
        - name: increment-decrement
        - name: var-naming
        - name: var-declaration
        - name: package-comments
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: errorf
        - name: empty-block
        - name: superfluous-else
        - name: unused-parameter
        - name: unreachable-code
        - name: redefines-builtin-id
    perfsprint:
      err-error: true
      errorf: true
      sprintf1: true

  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - gosec
          - goconst
          - errcheck
          - forcetypeassert
          - thelper
          - perfsprint
        path: _test\.go
      - linters:
          - gochecknoinits
        path: (cmd/|plugins/)
      - linters:
          - gocyclo
          - nestif
          - gocognit
        path: _test\.go
    paths:
      - third_party$
      - builtin$
      - examples$

issues:
  max-issues-per-linter: 50
  max-same-issues: 5

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/edelwud/terraci
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
