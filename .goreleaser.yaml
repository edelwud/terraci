# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: terraci

gomod:
  proxy: true

before:
  hooks:
    - go mod tidy
    - ./scripts/generate-completions.sh
    - ./scripts/generate-manpages.sh

builds:
  - id: terraci
    main: ./cmd/terraci
    binary: terraci
    env: [CGO_ENABLED=0]
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    mod_timestamp: "{{ .CommitTimestamp }}"
    flags: [-trimpath]
    ldflags: &ldflags
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.CommitDate}}

  - id: xterraci
    main: ./cmd/xterraci
    binary: xterraci
    env: [CGO_ENABLED=0]
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    mod_timestamp: "{{ .CommitTimestamp }}"
    flags: [-trimpath]
    ldflags: *ldflags

universal_binaries:
  - id: terraci
    ids: [terraci]
    replace: true
    name_template: terraci
  - id: xterraci
    ids: [xterraci]
    replace: true
    name_template: xterraci

archives:
  - files: [README.md, LICENSE, completions/*, manpages/*]
    format_overrides:
      - goos: windows
        formats: [zip]

homebrew_casks:
  - repository:
      owner: edelwud
      name: homebrew-tap
    homepage: "https://edelwud.github.io/{{ .ProjectName }}/"
    description: "CLI tool for analyzing Terraform projects and generating CI pipelines"
    url:
      verified: "github.com/edelwud/{{ .ProjectName }}"
    binaries:
      - terraci
      - xterraci
    manpages:
      - "manpages/{{ .ProjectName }}.1"
      - "manpages/{{ .ProjectName }}-completion.1"
      - "manpages/{{ .ProjectName }}-cost.1"
      - "manpages/{{ .ProjectName }}-generate.1"
      - "manpages/{{ .ProjectName }}-graph.1"
      - "manpages/{{ .ProjectName }}-init.1"
      - "manpages/{{ .ProjectName }}-policy.1"
      - "manpages/{{ .ProjectName }}-policy-check.1"
      - "manpages/{{ .ProjectName }}-policy-pull.1"
      - "manpages/{{ .ProjectName }}-schema.1"
      - "manpages/{{ .ProjectName }}-summary.1"
      - "manpages/{{ .ProjectName }}-validate.1"
      - "manpages/{{ .ProjectName }}-version.1"
      - "manpages/xterraci.1"
      - "manpages/xterraci-build.1"
      - "manpages/xterraci-completion.1"
      - "manpages/xterraci-list-plugins.1"
      - "manpages/xterraci-version.1"
    completions:
      bash: "completions/{{ .ProjectName }}.bash"
      zsh: "completions/_{{ .ProjectName }}"
      fish: "completions/{{ .ProjectName }}.fish"
    custom_block: |
      bash_completion "completions/xterraci.bash"
      zsh_completion "completions/_xterraci"
      fish_completion "completions/xterraci.fish"
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/terraci"]
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/xterraci"]
          end

nfpms:
  - file_name_template: "{{ .ConventionalFileName }}"
    maintainer: "Maksim Yersh <yersh.maks@gmail.com>"
    description: "CLI tool for analyzing Terraform projects and generating CI pipelines"
    homepage: "https://github.com/edelwud/terraci"
    license: MIT
    contents:
      # completions (all)
      - src: ./completions/{{ .ProjectName }}.bash
        dst: /etc/bash_completion.d/{{ .ProjectName }}
      - src: ./completions/{{ .ProjectName }}.fish
        dst: /usr/share/fish/completions/{{ .ProjectName }}.fish
      - src: ./completions/_{{ .ProjectName }}
        dst: /usr/local/share/zsh/site-functions/_{{ .ProjectName }}
      - src: ./completions/xterraci.bash
        dst: /etc/bash_completion.d/xterraci
      - src: ./completions/xterraci.fish
        dst: /usr/share/fish/completions/xterraci.fish
      - src: ./completions/_xterraci
        dst: /usr/local/share/zsh/site-functions/_xterraci
      # man pages (all)
      - src: ./manpages/*.1
        dst: /usr/share/man/man1/
    formats: [deb, rpm, apk]

sboms:
  - artifacts: archive
  - id: source
    artifacts: source

checksum:
  name_template: checksums.txt

signs:
  - cmd: cosign
    signature: "${artifact}.sigstore.json"
    args: ["sign-blob", "--bundle=${signature}", "${artifact}", "--yes"]
    artifacts: checksum
    output: true

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^test:"
      - "^chore"
      - "merge conflict"
      - Merge pull request
      - Merge remote-tracking branch
      - Merge branch
      - go mod tidy
  groups:
    - title: Dependency updates
      regexp: "^.*feat\\(deps\\)*:+.*$"
      order: 300
    - title: "New Features"
      regexp: "^.*feat[(\\w)]*:+.*$"
      order: 100
    - title: "Bug fixes"
      regexp: "^.*fix[(\\w)]*:+.*$"
      order: 200
    - title: "Documentation updates"
      regexp: "^.*docs[(\\w)]*:+.*$"
      order: 400
    - title: Other
      order: 9999

dockers_v2:
  - id: terraci
    ids: [terraci, xterraci]
    images: ["ghcr.io/edelwud/terraci"]
    tags:
      - "{{ .Tag }}"
      - "{{ if not .IsNightly }}latest{{ end }}"
    dockerfile: Dockerfile
    platforms: [linux/amd64, linux/arm64]
    sbom: true
    labels:
      org.opencontainers.image.created: "{{.Date}}"
      org.opencontainers.image.name: "{{.ProjectName}}"
      org.opencontainers.image.description: "CLI tool for analyzing Terraform projects and generating CI pipelines"
      org.opencontainers.image.revision: "{{.FullCommit}}"
      org.opencontainers.image.version: "{{.Version}}"
      org.opencontainers.image.source: "{{.GitURL}}"

docker_signs:
  - cmd: cosign
    output: true
    args: ["sign", "${artifact}", "--yes"]

release:
  draft: false
  prerelease: auto
  name_template: "{{ .ProjectName }} v{{ .Version }}"
